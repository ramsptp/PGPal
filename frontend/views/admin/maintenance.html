<!-- views/admin/maintenance.html — Maintenance Log Management -->
<div class="main-content">
  <h2 class="page-title">Maintenance Log</h2>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>Tenant</th>
          <th>Room</th>
          <th>Issue</th>
          <th>Status</th>
          <th>Date Filed</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr ng-if="requests.length === 0">
          <td colspan="6" style="text-align:center;color:#aaa;padding:20px;">
            No maintenance requests found.
          </td>
        </tr>
        <tr ng-repeat="req in requests">
          <td>{{ req.tenantId.name }}</td>
          <td>{{ req.roomId.roomNumber }}</td>
          <td><strong>{{ req.title }}</strong><br>
              <small class="text-muted">{{ req.description }}</small></td>
          <td>
            <span class="badge"
              ng-class="{
                'badge-warning': req.status === 'Pending',
                'badge-info':    req.status === 'In Progress',
                'badge-success': req.status === 'Resolved'
              }">{{ req.status }}</span>
          </td>
          <td>{{ req.createdAt | date:'mediumDate' }}</td>
          <td>
            <button class="btn btn-primary btn-sm"
                    ng-click="openRequest(req)">Update</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- ── Inline Update Form ────────────────────────────────── -->
  <div class="form-card mt-4" ng-if="selected">
    <h4 style="margin-bottom:16px;">Update: {{ selected.title }}</h4>
    <div class="form-group">
      <label>New Status</label>
      <select class="pg-select" ng-model="newStatus">
        <option value="Pending">Pending</option>
        <option value="In Progress">In Progress</option>
        <option value="Resolved">Resolved</option>
      </select>
    </div>
    <div class="form-group">
      <label>Admin Note</label>
      <textarea class="form-control" ng-model="adminNote" rows="3"
                placeholder="E.g. Plumber scheduled for Thursday"></textarea>
    </div>
    <button class="btn btn-success" ng-click="updateStatus()">Save Update</button>
    <button class="btn btn-danger" ng-click="selected = null" style="margin-left:10px;">
      Cancel
    </button>
  </div>
</div>

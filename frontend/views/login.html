<!-- views/login.html — Tenant / Admin Login Page -->
<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-logo">PG<span>Pal</span></div>
    <p class="auth-subtitle">Paying Guest Management System</p>
    <h2>Sign In</h2>

    <!-- Error alert shown when login fails -->
    <div class="alert alert-danger" ng-if="errorMsg">{{ errorMsg }}</div>

    <form ng-submit="login()">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" class="form-control"
               ng-model="loginData.email"
               placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" class="form-control"
               ng-model="loginData.password"
               placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;">
        Login
      </button>
    </form>

    <p class="text-muted mt-4" style="text-align:center;">
      New tenant?
      <a href="#!/register">Register here</a>
    </p>
  </div>
</div>
